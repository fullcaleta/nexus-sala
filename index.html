<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEXUS — Sala General</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="bg-grid"></div>

  <!-- Pantalla de ingreso -->
  <main id="join-screen" class="screen join-screen">
    <div class="glass-panel join-card">
      <h1 class="logo">NEXUS</h1>
      
      <form id="join-form" class="join-form">
        <label for="username-input">Nombre de usuario</label>
        <input
          id="username-input"
          type="text"
          placeholder="Ej: Shadow_99"
          maxlength="24"
          autocomplete="off"
          required
        />
        <p id="join-error" class="error-text"></p>
        <button type="submit" class="btn btn-primary">Entrar a la Sala General</button>
      </form>
      
    </div>
  </main>

  <!-- Pantalla de la sala -->
  <div id="room-screen" class="screen room-screen hidden">
    <aside class="sidebar glass-panel">
      <div class="sidebar-header">
        <span class="room-name"># general</span>
        <span class="member-count-badge"><span id="member-count">0</span> en línea</span>
      </div>
      <ul id="member-list" class="member-list"></ul>
    </aside>

    <section class="main-area">
      <div id="video-grid" class="video-grid"></div>

      <div class="call-controls glass-panel">
        <button id="toggle-mic-btn" class="btn btn-icon" title="Activar micrófono">🔇</button>
        <button id="toggle-cam-btn" class="btn btn-icon" title="Activar cámara">🚫</button>
        <button id="switch-cam-btn" class="btn btn-icon" title="Cambiar de cámara" disabled>🔄</button>
        <button id="notify-btn" class="btn btn-icon" title="Activar notificaciones">🔕</button>
        <button id="leave-btn" class="btn btn-danger" title="Salir de la sala">Salir</button>
      </div>
    </section>

    <aside class="chat-panel glass-panel">
      <div class="chat-header">Chat de la sala</div>
      <div id="chat-messages" class="chat-messages"></div>
      <form id="chat-form" class="chat-form">
        <input id="chat-input" type="text" placeholder="Escribe un mensaje..." maxlength="500" autocomplete="off" />
        <button type="submit" class="btn btn-send">➤</button>
      </form>
    </aside>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
